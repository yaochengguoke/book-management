server:
  port: ${PORT:80}

spring:
  datasource:
    url: jdbc:h2:file:/app/data/bookdb;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

jwt:
  secret: ${JWT_SECRET:book-management-secret-key-change-in-production}
  expiration-ms: 86400000

wechat:
  app-id: ${WECHAT_APPID:wx277b30e3685c590f}
  app-secret: ${WECHAT_APPSECRET:737ceefc0ec6c99df26efda82c906031}
