server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:sqlite:./data/example_db.sqlite
    username: admin
    password: password
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.community.dialect.SQLiteDialect

jwt:
  secret: ${JWT_SECRET:book-management-secret-key-change-in-production}
  expiration-ms: 86400000
