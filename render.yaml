services:
  - type: web
    name: book-management
    env: docker
    dockerfilePath: ./Dockerfile
    rootDir: .
    healthCheckPath: /api/books
    envVars:
      - key: PORT
        value: "80"
      - key: JWT_SECRET
        value: book-management-prod-secret-change-me
      - key: BACKEND_PORT
        value: "8080"
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1
    plan: free
